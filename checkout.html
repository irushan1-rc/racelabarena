<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout — RaceLab Arena</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&family=Barlow+Condensed:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --red: #e8192c; --red-dark: #b8111f;
  --bg: #0a0a0a; --bg2: #111; --bg3: #1a1a1a;
  --white: #fff; --grey: #888; --lgrey: #ccc;
  --border: rgba(255,255,255,0.08);
}
body { background: var(--bg); color: var(--white); font-family: 'Inter', sans-serif; }
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  padding: 0 48px; height: 64px;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(10,10,10,0.95); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}
.logo { display:flex; align-items:center; text-decoration:none; overflow:hidden; height:64px; }

.checkout-wrap { max-width: 900px; margin: 0 auto; padding: 96px 5% 80px; display: grid; grid-template-columns: 1fr 360px; gap: 48px; align-items: start; }

/* FORM SIDE */
.section-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 1.4rem; text-transform: uppercase; margin-bottom: 20px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 32px; }
.form-grid.full { grid-template-columns: 1fr; }
.fg { display: flex; flex-direction: column; gap: 6px; }
.fg label { font-size: 0.75rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--lgrey); }
.fg input, .fg select { padding: 12px 14px; background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; color: var(--white); font-size: 0.88rem; font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.2s; }
.fg input:focus, .fg select:focus { border-color: rgba(232,25,44,0.5); }
.fg input::placeholder { color: var(--grey); }
.fg select option { background: var(--bg2); }

/* ORDER SUMMARY */
.order-summary { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 28px; position: sticky; top: 80px; }
.summary-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 1.1rem; text-transform: uppercase; margin-bottom: 20px; }
.summary-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }
.summary-item:last-of-type { border-bottom: none; }
.summary-item .item-name { font-size: 0.85rem; color: var(--lgrey); }
.summary-item .item-val { font-size: 0.85rem; font-weight: 600; }
.summary-total { display: flex; justify-content: space-between; align-items: center; padding-top: 16px; margin-top: 4px; border-top: 1px solid var(--border); }
.summary-total .label { font-size: 0.9rem; font-weight: 700; }
.summary-total .val { font-size: 1.3rem; font-weight: 800; color: var(--red); }
.shipping-note { font-size: 0.75rem; color: var(--grey); margin-top: 12px; text-align: center; }

/* SUBMIT BTN */
.btn-submit { width: 100%; padding: 16px; background: var(--red); color: var(--white); border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; font-family: 'Inter', sans-serif; transition: background 0.2s; margin-top: 20px; }
.btn-submit:hover { background: var(--red-dark); }
.secure-note { display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 0.75rem; color: var(--grey); margin-top: 12px; }

footer { background: var(--bg2); border-top: 1px solid var(--border); padding: 24px 5%; text-align: center; font-size: 0.78rem; color: var(--grey); margin-top: 40px; }

@media (max-width: 768px) {
  nav { padding: 0 20px; }
  .checkout-wrap { grid-template-columns: 1fr; gap: 32px; }
  .order-summary { position: static; }
  .form-grid { grid-template-columns: 1fr; }
}
</style>
</head>

  <!-- FORM -->
  <div>
    <h2 class="section-title">Your Details</h2>
    <form id="checkoutForm" action="https://formspree.io/f/xkopypzj" method="POST">

      <!-- Hidden order fields populated by JS -->
      <input type="hidden" name="order_product" id="f-product">
      <input type="hidden" name="order_size" id="f-size">
      <input type="hidden" name="order_price" id="f-price">

      <div class="form-grid">
        <div class="fg"><label>First Name</label><input type="text" name="first_name" placeholder="Alex" required></div>
        <div class="fg"><label>Last Name</label><input type="text" name="last_name" placeholder="Smith" required></div>
      </div>
      <div class="form-grid full">
        <div class="fg"><label>Email</label><input type="email" name="email" placeholder="your@email.com" required></div>
      </div>
      <div class="form-grid full">
        <div class="fg"><label>Phone</label><input type="tel" name="phone" placeholder="+61 400 000 000"></div>
      </div>

      <h2 class="section-title" style="margin-top:32px;">Shipping Address</h2>
      <div class="form-grid full">
        <div class="fg"><label>Street Address</label><input type="text" name="address" placeholder="123 Race Street" required></div>
      </div>
      <div class="form-grid">
        <div class="fg"><label>Suburb</label><input type="text" name="suburb" placeholder="Perth" required></div>
        <div class="fg"><label>State</label>
          <select name="state" required>

            <option>QLD</option><option>SA</option><option>TAS</option>
            <option>ACT</option><option>NT</option>

        </div>
      </div>
      <div class="form-grid">
        <div class="fg"><label>Postcode</label><input type="text" name="postcode" placeholder="6000" required></div>
        <div class="fg"><label>Country</label>
          <select name="country">
            <option value="Australia" selected>Australia</option>
            <option>New Zealand</option>
            <option>United States</option>
            <option>United Kingdom</option>
            <option>Canada</option>
            <option>Germany</option>
            <option>France</option>
            <option>Japan</option>
            <option>Singapore</option>
            <option>Other</option>
          </select>
        </div>
      </div>
      <div class="form-grid full">
        <div class="fg"><label>Order Notes (Optional)</label><input type="text" name="notes" placeholder="Any special instructions..."></div>
      </div>

      <button type="submit" class="btn-submit">Continue to Payment →</button>
      <div class="secure-note">🔒 Your details are sent securely. Payment processed via Stripe.</div>
    </form>
